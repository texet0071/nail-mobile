<ion-header>
  <ion-toolbar>
    <ion-title>Обо мне</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="dismiss()">
        <ion-icon name="close-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="about-avatar">
    <img
      [src]="profile().avatar"
      alt="avatar"
      class="avatar-img"
    />
    <h2>{{ profile().name }}</h2>
    <p class="specialization">{{ profile().specialization }}</p>
  </div>

  <ion-list class="about-list">
    <!-- Город -->
    <ion-item>
      <ion-icon name="location-outline" slot="start" color="primary"></ion-icon>
      <ion-label>
        <h3>Город</h3>
        <p>{{ profile().city }}</p>
      </ion-label>
    </ion-item>

    <!-- Телефон -->
    <ion-item>
      <ion-icon name="call-outline" slot="start" color="primary"></ion-icon>
      <ion-label>
        <h3>Телефон</h3>
        <p>{{ profile().phone }}</p>
      </ion-label>
    </ion-item>

    <!-- Зона работы -->
    <ion-item>
      <ion-icon name="location-outline" slot="start" color="primary"></ion-icon>
      <ion-label>
        <h3>Зона работы</h3>
        <p>{{ profile().workZone }}</p>
      </ion-label>
    </ion-item>
  </ion-list>

  <!-- Скиллы (в отдельном блоке после услуг) -->
  <ion-list class="about-list">
    <ion-item>
      <ion-icon name="ribbon-outline" slot="start" color="primary"></ion-icon>
      <ion-label>
        <h3>Скиллы</h3>
        <p>
          @for (skill of profile().skills; track skill; let last = $last) {
            {{ skill }}@if (!last) {<br />}
          }
        </p>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>
