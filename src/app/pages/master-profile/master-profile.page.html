<ion-header>
  <ion-toolbar>
    <ion-title>Профиль мастера</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="onLogout()">
        <ion-icon name="log-out-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="profile-header">
    <ion-avatar class="profile-avatar">
      <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=master&backgroundColor=b6e3f4" alt="avatar" />
    </ion-avatar>
    <h2>Юлия</h2>
    <p>Мастер маникюра</p>
  </div>

  <ion-item>
    <ion-icon name="star" slot="start" color="warning"></ion-icon>
    <ion-label>
      <h3>Рейтинг</h3>
      <p>4.9 ★ (128 отзывов)</p>
    </ion-label>
  </ion-item>

  <ion-item button (click)="openAboutModal()">
    <ion-icon name="information-circle-outline" slot="start" color="primary"></ion-icon>
    <ion-label>
      <h3>Обо мне</h3>
      <p>Город, телефон, скиллы</p>
    </ion-label>
  </ion-item>
</ion-content>
