<ion-header>
  <ion-toolbar>
    <ion-title>Профиль мастера</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="profile-header">
    <ion-avatar class="profile-avatar">
      <img [src]="profile().avatar" alt="avatar" />
    </ion-avatar>
    <h2>{{ profile().name }}</h2>
    <p>{{ profile().specialization }}</p>
  </div>

  <!-- Рейтинг -->
  <ion-item>
    <ion-icon name="star" slot="start" color="warning"></ion-icon>
    <ion-label>
      <h3>Рейтинг</h3>
      <p>{{ profile().rating }} ★ ({{ profile().reviewsCount }} отзывов)</p>
    </ion-label>
  </ion-item>

  <!-- Зона работы -->
  <ion-item>
    <ion-icon name="location-outline" slot="start" color="primary"></ion-icon>
    <ion-label>
      <h3>Зона работы</h3>
      <p>{{ profile().workZone }}</p>
    </ion-label>
  </ion-item>

  <!-- Обо мне -->
  <ion-item button (click)="openAboutModal()">
    <ion-icon name="information-circle-outline" slot="start" color="primary"></ion-icon>
    <ion-label>
      <h3>Обо мне</h3>
      <p>{{ profile().city }}, {{ profile().phone }}, {{ profile().skills.length }} навыков</p>
    </ion-label>
  </ion-item>

  <div class="logout-section">
    <ion-button expand="block" color="danger" fill="outline" (click)="onLogout()">
      <ion-icon slot="start" name="log-out-outline"></ion-icon>
      Выйти
    </ion-button>
  </div>
</ion-content>
